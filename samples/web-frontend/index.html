<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rampart Sample App</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
      .container { max-width: 480px; width: 100%; padding: 2rem; }
      h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #38bdf8; }
      .card { background: #1e293b; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
      label { display: block; font-size: 0.875rem; color: #94a3b8; margin-bottom: 0.25rem; }
      input { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #334155; border-radius: 6px; background: #0f172a; color: #e2e8f0; font-size: 0.875rem; margin-bottom: 0.75rem; }
      input:focus { outline: none; border-color: #38bdf8; }
      button { padding: 0.5rem 1rem; border: none; border-radius: 6px; font-size: 0.875rem; cursor: pointer; font-weight: 500; }
      .btn-primary { background: #38bdf8; color: #0f172a; width: 100%; }
      .btn-primary:hover { background: #7dd3fc; }
      .btn-danger { background: #ef4444; color: white; }
      .btn-secondary { background: #334155; color: #e2e8f0; margin-right: 0.5rem; }
      .actions { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
      .actions button { flex: 1; }
      .status { font-size: 0.75rem; color: #64748b; margin-top: 0.5rem; }
      .error { color: #f87171; font-size: 0.875rem; margin-top: 0.5rem; }
      .success { color: #4ade80; font-size: 0.875rem; }
      pre { background: #0f172a; border-radius: 6px; padding: 1rem; font-size: 0.75rem; overflow-x: auto; margin-top: 0.5rem; color: #94a3b8; }
      .hidden { display: none; }
      .user-info { font-size: 0.875rem; }
      .user-info dt { color: #64748b; font-size: 0.75rem; }
      .user-info dd { margin-bottom: 0.5rem; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Rampart Sample</h1>

      <!-- Login Form -->
      <div id="login-section" class="card">
        <label for="identifier">Email or Username</label>
        <input type="text" id="identifier" placeholder="admin" />
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="password" />
        <button class="btn-primary" id="login-btn">Login</button>
        <div id="login-error" class="error hidden"></div>
      </div>

      <!-- Authenticated Section -->
      <div id="auth-section" class="hidden">
        <div class="card">
          <div class="user-info" id="user-info"></div>
          <div class="actions">
            <button class="btn-secondary" id="profile-btn">Fetch /api/profile</button>
            <button class="btn-danger" id="logout-btn">Logout</button>
          </div>
        </div>
        <pre id="api-result" class="hidden"></pre>
      </div>

      <p class="status">Rampart: <span id="issuer-url">loading...</span></p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
