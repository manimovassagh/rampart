services:
  rampart:
    build:
      context: .
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-unknown}
    ports:
      - "127.0.0.1:${RAMPART_PORT:-8080}:8080"
    environment:
      RAMPART_PORT: "8080"
      RAMPART_DB_URL: "postgres://${POSTGRES_USER:-rampart}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env or environment}@postgres:5432/${POSTGRES_DB:-rampart}?sslmode=disable"
      RAMPART_LOG_LEVEL: "${RAMPART_LOG_LEVEL:-info}"
      RAMPART_ALLOWED_ORIGINS: "${RAMPART_ALLOWED_ORIGINS:-}"
      RAMPART_SIGNING_KEY_PATH: "/data/rampart-signing-key.pem"
      RAMPART_ISSUER: "${RAMPART_ISSUER:-http://localhost:8080}"
      # Social login providers (uncomment and set to enable)
      # RAMPART_GOOGLE_CLIENT_ID: ""
      # RAMPART_GOOGLE_CLIENT_SECRET: ""
      # RAMPART_GITHUB_CLIENT_ID: ""
      # RAMPART_GITHUB_CLIENT_SECRET: ""
      # RAMPART_APPLE_CLIENT_ID: ""
      # RAMPART_APPLE_TEAM_ID: ""
      # RAMPART_APPLE_KEY_ID: ""
      # RAMPART_APPLE_PRIVATE_KEY: ""
    volumes:
      - signingkey:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"
        reservations:
          memory: 64M
          cpus: "0.25"
    networks:
      - rampart-net

  postgres:
    image: postgres:16.6-alpine
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-rampart}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env or environment}"
      POSTGRES_DB: "${POSTGRES_DB:-rampart}"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rampart}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    networks:
      - rampart-net

volumes:
  pgdata:
  signingkey:

networks:
  rampart-net:
    driver: bridge
