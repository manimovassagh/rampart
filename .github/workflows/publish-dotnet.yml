name: Publish .NET Adapter

on:
  push:
    tags:
      - "@rampart-auth/dotnet@*"

permissions:
  contents: read

jobs:
  nuget-publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: "8.0.x"

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG##*@}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and pack
        working-directory: adapters/backend/dotnet
        run: |
          dotnet restore
          dotnet build --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }}
          dotnet pack --configuration Release --no-build -p:Version=${{ steps.version.outputs.version }} --output ./nupkg

      - name: Publish to NuGet
        run: dotnet nuget push ./adapters/backend/dotnet/nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
