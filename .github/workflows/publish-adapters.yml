name: Publish Adapters

on:
  push:
    tags:
      - "@rampart-auth/web@*"
      - "@rampart-auth/react@*"
      - "@rampart-auth/nextjs@*"
      - "@rampart-auth/node@*"
      - "rampart-python@*"

permissions:
  contents: read
  id-token: write

jobs:
  npm-publish:
    name: Publish npm package
    if: startsWith(github.ref_name, '@rampart-auth/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Resolve package directory
        id: resolve
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG="${TAG%@*}"
          case "$PKG" in
            "@rampart-auth/web")    DIR="adapters/frontend/web" ;;
            "@rampart-auth/react")  DIR="adapters/frontend/react" ;;
            "@rampart-auth/nextjs") DIR="adapters/frontend/nextjs" ;;
            "@rampart-auth/node")   DIR="adapters/backend/node" ;;
            *) echo "Unknown package: $PKG" && exit 1 ;;
          esac
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"
          echo "pkg=$PKG" >> "$GITHUB_OUTPUT"

      - name: Install, build, and publish
        working-directory: ${{ steps.resolve.outputs.dir }}
        run: |
          npm ci
          npm run build
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  pypi-publish:
    name: Publish to PyPI
    if: startsWith(github.ref_name, 'rampart-python@')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Build and publish
        working-directory: adapters/backend/python
        run: |
          pip install build twine
          python -m build
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
