name: Security

on:
  workflow_call:
    inputs:
      go-version-file:
        description: "Path to go.mod for Go version"
        required: false
        type: string
        default: "go.mod"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: ${{ inputs.go-version-file }}

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: |
          set +e
          output=$(govulncheck ./... 2>&1)
          exit_code=$?
          set -e

          # Count vulnerabilities
          vuln_count=$(echo "$output" | grep -c "^Vulnerability" || true)

          if [ $exit_code -eq 0 ]; then
            echo "No vulnerabilities found."
            cat >> "$GITHUB_STEP_SUMMARY" << 'SUMEOF'
          ### govulncheck: No vulnerabilities found
          SUMEOF
          else
            # Show output in logs but suppress noisy annotations
            echo "$output"
            cat >> "$GITHUB_STEP_SUMMARY" << SUMEOF
          ### govulncheck: ${vuln_count} vulnerabilities found

          <details>
          <summary>Details</summary>

          \`\`\`
          $(echo "$output" | grep -A2 "^Vulnerability" || echo "See logs for details")
          \`\`\`
          </details>
          SUMEOF
            exit $exit_code
          fi

  gosec:
    name: gosec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: ${{ inputs.go-version-file }}

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: gosec -severity high -confidence high -exclude=G117 ./...

      - name: Gosec summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'SUMEOF'
          ### gosec: Passed
          No high-severity/high-confidence issues found.
          SUMEOF
