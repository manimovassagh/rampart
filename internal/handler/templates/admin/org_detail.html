{{define "content"}}
<div class="max-w-3xl space-y-6">
    <!-- Organization Edit Form -->
    <form method="POST" action="/admin/organizations/{{.OrgDetail.ID}}" class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 space-y-5">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

        <div>
            <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
            <input type="text" id="name" name="name" value="{{.OrgDetail.Name}}" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Slug</label>
            <p class="px-3 py-2 bg-gray-50 border border-gray-200 rounded-md text-sm text-gray-600 font-mono">{{.OrgDetail.Slug}}</p>
        </div>

        <div>
            <label for="display_name" class="block text-sm font-medium text-gray-700 mb-1">Display Name</label>
            <input type="text" id="display_name" name="display_name" value="{{.OrgDetail.DisplayName}}"
                   class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label class="flex items-center gap-2">
                <input type="checkbox" name="enabled" value="true" {{if .OrgDetail.Enabled}}checked{{end}}
                       class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                <span class="text-sm text-gray-700">Enabled</span>
            </label>
        </div>

        <div class="flex items-center gap-3 pt-2">
            <button type="submit" class="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-md hover:bg-blue-700">
                Save Changes
            </button>
            <a href="/admin/organizations" class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800">Back to List</a>
        </div>
    </form>

    <!-- Organization Settings -->
    {{if .OrgSettings}}
    <form method="POST" action="/admin/organizations/{{.OrgDetail.ID}}/settings" class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 space-y-5">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
        <h3 class="text-sm font-semibold text-gray-900 border-b pb-3">Security Settings</h3>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label for="password_min_length" class="block text-sm font-medium text-gray-700 mb-1">Min Password Length</label>
                <input type="number" id="password_min_length" name="password_min_length" min="1" value="{{.OrgSettings.PasswordMinLength}}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label for="mfa_enforcement" class="block text-sm font-medium text-gray-700 mb-1">MFA Enforcement</label>
                <select id="mfa_enforcement" name="mfa_enforcement"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="off" {{if eq .OrgSettings.MFAEnforcement "off"}}selected{{end}}>Off</option>
                    <option value="optional" {{if eq .OrgSettings.MFAEnforcement "optional"}}selected{{end}}>Optional</option>
                    <option value="required" {{if eq .OrgSettings.MFAEnforcement "required"}}selected{{end}}>Required</option>
                </select>
            </div>
        </div>

        <div class="flex items-center gap-6">
            <label class="flex items-center gap-2">
                <input type="checkbox" name="password_require_uppercase" value="true" {{if .OrgSettings.PasswordRequireUppercase}}checked{{end}}
                       class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                <span class="text-sm text-gray-700">Require Uppercase</span>
            </label>
            <label class="flex items-center gap-2">
                <input type="checkbox" name="password_require_lowercase" value="true" {{if .OrgSettings.PasswordRequireLowercase}}checked{{end}}
                       class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                <span class="text-sm text-gray-700">Require Lowercase</span>
            </label>
            <label class="flex items-center gap-2">
                <input type="checkbox" name="password_require_numbers" value="true" {{if .OrgSettings.PasswordRequireNumbers}}checked{{end}}
                       class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                <span class="text-sm text-gray-700">Require Numbers</span>
            </label>
            <label class="flex items-center gap-2">
                <input type="checkbox" name="password_require_symbols" value="true" {{if .OrgSettings.PasswordRequireSymbols}}checked{{end}}
                       class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                <span class="text-sm text-gray-700">Require Symbols</span>
            </label>
        </div>

        <h3 class="text-sm font-semibold text-gray-900 border-b pb-3 pt-2">Authentication Settings</h3>

        <div class="flex items-center gap-6">
            <label class="flex items-center gap-2">
                <input type="checkbox" name="self_registration_enabled" value="true" {{if .OrgSettings.SelfRegistrationEnabled}}checked{{end}}
                       class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                <span class="text-sm text-gray-700">Self-Registration</span>
            </label>
            <label class="flex items-center gap-2">
                <input type="checkbox" name="email_verification_required" value="true" {{if .OrgSettings.EmailVerificationRequired}}checked{{end}}
                       class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                <span class="text-sm text-gray-700">Email Verification Required</span>
            </label>
            <label class="flex items-center gap-2">
                <input type="checkbox" name="forgot_password_enabled" value="true" {{if .OrgSettings.ForgotPasswordEnabled}}checked{{end}}
                       class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                <span class="text-sm text-gray-700">Forgot Password</span>
            </label>
            <label class="flex items-center gap-2">
                <input type="checkbox" name="remember_me_enabled" value="true" {{if .OrgSettings.RememberMeEnabled}}checked{{end}}
                       class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                <span class="text-sm text-gray-700">Remember Me</span>
            </label>
        </div>

        <h3 class="text-sm font-semibold text-gray-900 border-b pb-3 pt-2">Login Branding</h3>

        <div>
            <label for="login_page_title" class="block text-sm font-medium text-gray-700 mb-1">Login Page Title</label>
            <input type="text" id="login_page_title" name="login_page_title" value="{{.OrgSettings.LoginPageTitle}}" maxlength="255"
                   class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label for="login_page_message" class="block text-sm font-medium text-gray-700 mb-1">Login Page Message</label>
            <textarea id="login_page_message" name="login_page_message" rows="3"
                      class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">{{.OrgSettings.LoginPageMessage}}</textarea>
        </div>

        <div>
            <label for="login_theme" class="block text-sm font-medium text-gray-700 mb-1">Login Theme</label>
            <select id="login_theme" name="login_theme"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                <option value="default" {{if eq .OrgSettings.LoginTheme "default"}}selected{{end}}>Default — Clean, modern</option>
                <option value="dark" {{if eq .OrgSettings.LoginTheme "dark"}}selected{{end}}>Dark — Purple/blue accents</option>
                <option value="minimal" {{if eq .OrgSettings.LoginTheme "minimal"}}selected{{end}}>Minimal — Ultra-minimal</option>
                <option value="corporate" {{if eq .OrgSettings.LoginTheme "corporate"}}selected{{end}}>Corporate — Professional with header</option>
                <option value="gradient" {{if eq .OrgSettings.LoginTheme "gradient"}}selected{{end}}>Gradient — Eye-catching gradient</option>
            </select>
        </div>

        <h3 class="text-sm font-semibold text-gray-900 border-b pb-3 pt-2">Token Settings</h3>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label for="access_token_ttl" class="block text-sm font-medium text-gray-700 mb-1">Access Token TTL (seconds)</label>
                <input type="number" id="access_token_ttl" name="access_token_ttl_seconds" min="60" value="{{.OrgSettings.AccessTokenTTLSeconds}}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label for="refresh_token_ttl" class="block text-sm font-medium text-gray-700 mb-1">Refresh Token TTL (seconds)</label>
                <input type="number" id="refresh_token_ttl" name="refresh_token_ttl_seconds" min="60" value="{{.OrgSettings.RefreshTokenTTLSeconds}}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </div>

        <div class="flex items-center gap-3 pt-2">
            <button type="submit" class="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-md hover:bg-blue-700">
                Save Settings
            </button>
        </div>
    </form>
    {{end}}

    <!-- Export -->
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
        <h3 class="text-sm font-semibold text-gray-900 mb-3">Export</h3>
        <p class="text-sm text-gray-600 mb-3">Download this organization's configuration as JSON (settings, roles, groups, clients).</p>
        <a href="/admin/organizations/{{.OrgDetail.ID}}/export"
           class="inline-flex px-4 py-2 bg-gray-100 text-gray-700 text-sm font-medium rounded-md hover:bg-gray-200 border border-gray-300">
            Export Organization
        </a>
    </div>

    <!-- Danger Zone -->
    <div class="bg-white rounded-lg shadow-sm border border-red-200 p-6">
        <h3 class="text-sm font-semibold text-red-600 mb-3">Danger Zone</h3>
        <form method="POST" action="/admin/organizations/{{.OrgDetail.ID}}/delete">
            <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
            <button type="submit" class="px-4 py-2 bg-red-600 text-white text-sm font-medium rounded-md hover:bg-red-700"
                    onclick="return confirm('Are you sure you want to delete this organization? This action cannot be undone.')">
                Delete Organization
            </button>
        </form>
    </div>
</div>
{{end}}
