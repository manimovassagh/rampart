{{define "content"}}
<div class="max-w-2xl">
    <form method="POST" action="/admin/users" class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 space-y-5">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" id="username" name="username" required value="{{index .FormValues "username"}}"
                       class="w-full px-3 py-2 border {{if index .FormErrors "username"}}border-red-500{{else}}border-gray-300{{end}} rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                {{if index .FormErrors "username"}}<p class="mt-1 text-xs text-red-600">{{index .FormErrors "username"}}</p>{{end}}
            </div>
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" name="email" required value="{{index .FormValues "email"}}"
                       class="w-full px-3 py-2 border {{if index .FormErrors "email"}}border-red-500{{else}}border-gray-300{{end}} rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                {{if index .FormErrors "email"}}<p class="mt-1 text-xs text-red-600">{{index .FormErrors "email"}}</p>{{end}}
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label for="given_name" class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
                <input type="text" id="given_name" name="given_name" value="{{index .FormValues "given_name"}}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label for="family_name" class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
                <input type="text" id="family_name" name="family_name" value="{{index .FormValues "family_name"}}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </div>

        <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" id="password" name="password" required
                   class="w-full px-3 py-2 border {{if index .FormErrors "password"}}border-red-500{{else}}border-gray-300{{end}} rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            {{if index .FormErrors "password"}}<p class="mt-1 text-xs text-red-600">{{index .FormErrors "password"}}</p>{{end}}
        </div>

        <div class="flex items-center gap-6">
            <label class="flex items-center gap-2">
                <input type="checkbox" name="enabled" value="true" checked
                       class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                <span class="text-sm text-gray-700">Enabled</span>
            </label>
            <label class="flex items-center gap-2">
                <input type="checkbox" name="email_verified" value="true"
                       class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                <span class="text-sm text-gray-700">Email Verified</span>
            </label>
        </div>

        <div class="flex items-center gap-3 pt-2">
            <button type="submit" class="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-md hover:bg-blue-700">
                Create User
            </button>
            <a href="/admin/users" class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800">Cancel</a>
        </div>
    </form>
</div>
{{end}}
