{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} — Rampart Admin</title>
    <link rel="stylesheet" href="/static/admin.css">
    <script src="/static/htmx.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="flex min-h-screen">
        {{template "sidebar" .}}

        <div class="flex-1 flex flex-col">
            <!-- Top bar -->
            <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between">
                <h1 class="text-xl font-semibold text-gray-900">{{.Title}}</h1>
                <div class="flex items-center gap-4">
                    {{if .OrgName}}
                    <span class="inline-flex items-center gap-1.5 px-2.5 py-1 text-xs font-medium rounded-full bg-indigo-100 text-indigo-700 border border-indigo-200">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                        {{.OrgName}}
                    </span>
                    {{end}}
                    <span class="text-sm text-gray-600">{{.User.PreferredUsername}}</span>
                    <form method="POST" action="/admin/logout">
                        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
                        <button type="submit" class="text-sm text-gray-500 hover:text-gray-700">Logout</button>
                    </form>
                </div>
            </header>

            <!-- Flash messages -->
            {{template "flash" .}}

            <!-- Content -->
            <main class="flex-1 p-6">
                {{template "content" .}}
            </main>
        </div>
    </div>
</body>
</html>
{{end}}
