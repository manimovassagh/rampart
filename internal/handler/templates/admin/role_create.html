{{define "content"}}
<div class="max-w-2xl">
    <form method="POST" action="/admin/roles" class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 space-y-5">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

        <div>
            <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Role Name</label>
            <input type="text" id="name" name="name" required placeholder="e.g. editor, viewer, moderator"
                   class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <p class="text-xs text-gray-500 mt-1">Lowercase, will be included in JWT claims.</p>
        </div>

        <div>
            <label for="description" class="block text-sm font-medium text-gray-700 mb-1">Description</label>
            <input type="text" id="description" name="description" maxlength="500"
                   class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="flex items-center gap-3 pt-2">
            <button type="submit" class="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-md hover:bg-blue-700">
                Create Role
            </button>
            <a href="/admin/roles" class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800">Cancel</a>
        </div>
    </form>
</div>
{{end}}
