{{define "content"}}
<div class="max-w-2xl">
    <form method="POST" action="/admin/organizations/import" enctype="multipart/form-data"
          class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 space-y-5">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

        <p class="text-sm text-gray-600">
            Upload a JSON file exported from another Rampart instance.
            This will create a new organization with the exported settings, roles, and groups.
        </p>

        <div>
            <label for="file" class="block text-sm font-medium text-gray-700 mb-1">Organization Export File</label>
            <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center">
                <input type="file" id="file" name="file" accept=".json" required
                       class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-medium file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                <p class="text-xs text-gray-400 mt-2">JSON files only, max 10MB</p>
            </div>
        </div>

        <div class="flex items-center gap-3 pt-2">
            <button type="submit" class="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-md hover:bg-blue-700">
                Import Organization
            </button>
            <a href="/admin/organizations" class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800">Cancel</a>
        </div>
    </form>
</div>
{{end}}
