{{define "flash"}}
{{if .Flash}}
<div class="mx-6 mt-4">
    <div class="bg-green-50 border border-green-200 text-green-800 px-4 py-3 rounded-md text-sm flex items-center justify-between">
        <span>{{.Flash}}</span>
        <button onclick="this.parentElement.parentElement.remove()" class="text-green-600 hover:text-green-800 ml-4">&times;</button>
    </div>
</div>
{{end}}
{{if .Error}}
<div class="mx-6 mt-4">
    <div class="bg-red-50 border border-red-200 text-red-800 px-4 py-3 rounded-md text-sm flex items-center justify-between">
        <span>{{.Error}}</span>
        <button onclick="this.parentElement.parentElement.remove()" class="text-red-600 hover:text-red-800 ml-4">&times;</button>
    </div>
</div>
{{end}}
{{end}}
