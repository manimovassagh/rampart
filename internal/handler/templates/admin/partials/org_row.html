{{define "org_row"}}
<tr id="org-{{.ID}}">
    <td class="px-6 py-4 whitespace-nowrap">
        <a href="/admin/organizations/{{.ID}}" class="text-sm font-medium text-gray-900 hover:text-blue-600">
            {{if .DisplayName}}{{.DisplayName}}{{else}}{{.Name}}{{end}}
        </a>
    </td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 font-mono">{{.Slug}}</td>
    <td class="px-6 py-4 whitespace-nowrap">
        {{if .Enabled}}
        <span class="inline-flex px-2 py-0.5 text-xs font-medium rounded-full bg-green-100 text-green-800">Active</span>
        {{else}}
        <span class="inline-flex px-2 py-0.5 text-xs font-medium rounded-full bg-red-100 text-red-800">Disabled</span>
        {{end}}
    </td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">{{.UserCount}}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{.CreatedAt.Format "Jan 02, 2006"}}</td>
    <td class="px-6 py-4 whitespace-nowrap text-right">
        <a href="/admin/organizations/{{.ID}}" class="text-sm text-blue-600 hover:text-blue-800">Edit</a>
    </td>
</tr>
{{end}}
