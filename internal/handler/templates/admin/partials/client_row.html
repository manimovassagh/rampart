{{define "client_row"}}
<tr>
    <td class="px-6 py-4 whitespace-nowrap">
        <div class="text-sm font-medium text-gray-900">{{.Name}}</div>
        {{if .Description}}<div class="text-xs text-gray-500 truncate max-w-xs">{{.Description}}</div>{{end}}
    </td>
    <td class="px-6 py-4 whitespace-nowrap">
        <span class="text-sm text-gray-600 font-mono">{{.ID}}</span>
    </td>
    <td class="px-6 py-4 whitespace-nowrap">
        {{if eq .ClientType "confidential"}}
        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-purple-100 text-purple-800">Confidential</span>
        {{else}}
        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800">Public</span>
        {{end}}
    </td>
    <td class="px-6 py-4">
        <div class="text-sm text-gray-600">
            {{range .RedirectURIs}}
            <div class="truncate max-w-xs">{{.}}</div>
            {{else}}
            <span class="text-gray-400">None</span>
            {{end}}
        </div>
    </td>
    <td class="px-6 py-4 whitespace-nowrap">
        {{if .Enabled}}
        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">Enabled</span>
        {{else}}
        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800">Disabled</span>
        {{end}}
    </td>
    <td class="px-6 py-4 whitespace-nowrap text-right">
        <a href="/admin/clients/{{.ID}}" class="text-sm text-blue-600 hover:text-blue-800">Edit</a>
    </td>
</tr>
{{end}}
