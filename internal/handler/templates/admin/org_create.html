{{define "content"}}
<div class="max-w-2xl">
    <form method="POST" action="/admin/organizations" class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 space-y-5">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

        <div>
            <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
            <input type="text" id="name" name="name" required value="{{index .FormValues "name"}}"
                   class="w-full px-3 py-2 border {{if index .FormErrors "name"}}border-red-500{{else}}border-gray-300{{end}} rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            {{if index .FormErrors "name"}}<p class="mt-1 text-xs text-red-600">{{index .FormErrors "name"}}</p>{{end}}
        </div>

        <div>
            <label for="slug" class="block text-sm font-medium text-gray-700 mb-1">Slug</label>
            <input type="text" id="slug" name="slug" required pattern="[a-z0-9-]+" value="{{index .FormValues "slug"}}"
                   class="w-full px-3 py-2 border {{if index .FormErrors "slug"}}border-red-500{{else}}border-gray-300{{end}} rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            {{if index .FormErrors "slug"}}<p class="mt-1 text-xs text-red-600">{{index .FormErrors "slug"}}</p>
            {{else}}<p class="mt-1 text-xs text-gray-500">Lowercase letters, numbers, and hyphens only.</p>{{end}}
        </div>

        <div>
            <label for="display_name" class="block text-sm font-medium text-gray-700 mb-1">Display Name</label>
            <input type="text" id="display_name" name="display_name" value="{{index .FormValues "display_name"}}"
                   class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="flex items-center gap-3 pt-2">
            <button type="submit" class="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-md hover:bg-blue-700">
                Create Organization
            </button>
            <a href="/admin/organizations" class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800">Cancel</a>
        </div>
    </form>
</div>
{{end}}
