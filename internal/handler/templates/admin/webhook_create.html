{{define "content"}}
<div class="max-w-2xl">
    <form method="POST" action="/admin/webhooks" class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 space-y-5">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

        <div>
            <label for="url" class="block text-sm font-medium text-gray-700 mb-1">Payload URL</label>
            <input type="url" id="url" name="url" value="{{index .FormValues "url"}}" required placeholder="https://example.com/webhook"
                   class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            {{if index .FormErrors "url"}}<p class="text-red-600 text-xs mt-1">{{index .FormErrors "url"}}</p>{{end}}
        </div>

        <div>
            <label for="description" class="block text-sm font-medium text-gray-700 mb-1">Description</label>
            <input type="text" id="description" name="description" value="{{index .FormValues "description"}}" maxlength="255" placeholder="My webhook"
                   class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label for="event_types" class="block text-sm font-medium text-gray-700 mb-1">Event Types</label>
            <input type="text" id="event_types" name="event_types" value="{{index .FormValues "event_types"}}" required placeholder="* or user.login, user.created"
                   class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <p class="text-xs text-gray-500 mt-1">Comma-separated list. Use <code>*</code> for all events.</p>
            {{if index .FormErrors "event_types"}}<p class="text-red-600 text-xs mt-1">{{index .FormErrors "event_types"}}</p>{{end}}
        </div>

        <div class="flex justify-end gap-3 pt-2">
            <a href="/admin/webhooks" class="px-4 py-2 text-sm text-gray-700 border border-gray-300 rounded-md hover:bg-gray-50">Cancel</a>
            <button type="submit" class="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-md hover:bg-blue-700">Create Webhook</button>
        </div>
    </form>
</div>
{{end}}
