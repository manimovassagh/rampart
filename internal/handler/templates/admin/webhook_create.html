{{define "content"}}
<div class="max-w-2xl">
    <form method="POST" action="/admin/webhooks" class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 space-y-5">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

        <div>
            <label for="url" class="block text-sm font-medium text-gray-700 mb-1">Payload URL</label>
            <input type="url" id="url" name="url" required placeholder="https://example.com/webhook"
                   class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <p class="text-xs text-gray-500 mt-1">The URL that will receive POST requests when events occur.</p>
        </div>

        <div>
            <label for="description" class="block text-sm font-medium text-gray-700 mb-1">Description</label>
            <input type="text" id="description" name="description" maxlength="500" placeholder="Optional description"
                   class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Events</label>
            <p class="text-xs text-gray-500 mb-3">Select which events should trigger this webhook.</p>
            <div class="grid grid-cols-2 gap-2">
                {{range .AvailableEvents}}
                <label class="flex items-center gap-2 px-3 py-2 border border-gray-200 rounded-md hover:bg-gray-50 cursor-pointer">
                    <input type="checkbox" name="events" value="{{.}}"
                           class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                    <span class="text-sm text-gray-700">{{.}}</span>
                </label>
                {{end}}
            </div>
        </div>

        <div class="flex items-center gap-3 pt-2">
            <button type="submit" class="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-md hover:bg-blue-700">
                Create Webhook
            </button>
            <a href="/admin/webhooks" class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800">Cancel</a>
        </div>
    </form>
</div>
{{end}}
