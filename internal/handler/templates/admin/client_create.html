{{define "content"}}
<div class="max-w-2xl">
    <form method="POST" action="/admin/clients" class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 space-y-5">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

        <div>
            <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Client Name</label>
            <input type="text" id="name" name="name" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label for="description" class="block text-sm font-medium text-gray-700 mb-1">Description</label>
            <input type="text" id="description" name="description" maxlength="500"
                   class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label for="client_type" class="block text-sm font-medium text-gray-700 mb-1">Client Type</label>
            <select id="client_type" name="client_type"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="public">Public (SPA, mobile app — no secret)</option>
                <option value="confidential">Confidential (server-side — with secret)</option>
            </select>
            <p class="text-xs text-gray-500 mt-1">Public clients cannot securely store a secret. Confidential clients receive a generated secret on creation.</p>
        </div>

        <div>
            <label for="redirect_uris" class="block text-sm font-medium text-gray-700 mb-1">Redirect URIs</label>
            <textarea id="redirect_uris" name="redirect_uris" rows="3"
                      placeholder="https://example.com/callback&#10;http://localhost:3000/callback"
                      class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
            <p class="text-xs text-gray-500 mt-1">One URI per line. Must be exact match per OAuth 2.0 spec.</p>
        </div>

        <div class="flex items-center gap-3 pt-2">
            <button type="submit" class="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-md hover:bg-blue-700">
                Create Client
            </button>
            <a href="/admin/clients" class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800">Cancel</a>
        </div>
    </form>
</div>
{{end}}
