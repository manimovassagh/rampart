{{define "content"}}
<div class="flex items-center justify-between mb-6 gap-4">
    <div class="flex-1 max-w-md">
        <input type="text" name="search" placeholder="Search users..."
               value="{{.Search}}"
               hx-get="/admin/users" hx-trigger="keyup changed delay:300ms"
               hx-target="#table-body" hx-push-url="true"
               hx-include="[name='search'],[name='status']"
               class="w-full px-4 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
    </div>
    <div>
        <select name="status"
                hx-get="/admin/users" hx-trigger="change"
                hx-target="#table-body" hx-push-url="true"
                hx-include="[name='search'],[name='status']"
                class="px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">All Users</option>
            <option value="enabled" {{if eq .StatusFilter "enabled"}}selected{{end}}>Enabled</option>
            <option value="disabled" {{if eq .StatusFilter "disabled"}}selected{{end}}>Disabled</option>
        </select>
    </div>
    <a href="/admin/users/new" class="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-md hover:bg-blue-700">
        Create User
    </a>
</div>

<div id="table-body">
{{template "users_table" .}}
</div>
{{end}}

{{define "users_table"}}
<div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
    <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">User</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Sessions</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Created</th>
                <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
            </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
            {{range .Users}}
            {{template "user_row" .}}
            {{else}}
            <tr><td colspan="6" class="px-6 py-8 text-center text-gray-500 text-sm">No users found.</td></tr>
            {{end}}
        </tbody>
    </table>
</div>

{{template "pagination" .Pagination}}
{{end}}
