<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{if .LoginPageTitle}}{{.LoginPageTitle}}{{else}}Sign In — Rampart{{end}}</title>
    <style>
        :root {
            --primary: {{if .PrimaryColor}}{{.PrimaryColor}}{{else}}#818cf8{{end}};
            --primary-hover: {{if .PrimaryColor}}{{.PrimaryColor}}cc{{else}}#6366f1{{end}};
            --primary-glow: {{if .PrimaryColor}}{{.PrimaryColor}}22{{else}}rgba(129,140,248,0.12){{end}};
            --bg: {{if .BackgroundColor}}{{.BackgroundColor}}{{else}}#0f172a{{end}};
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #334155;
            --input-bg: #0f172a;
            --input-border: #334155;
            --input-focus: var(--primary);
            --error-bg: rgba(239,68,68,0.1);
            --error-text: #f87171;
            --error-border: rgba(239,68,68,0.25);
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(99,102,241,0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(139,92,246,0.06) 0%, transparent 50%);
            z-index: -1;
        }
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            margin: 1rem;
            position: relative;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), #a78bfa, #c084fc);
            border-radius: 16px 16px 0 0;
        }
        .logo-area { text-align: center; margin-bottom: 1.75rem; }
        .logo-area img { max-height: 48px; margin-bottom: 0.75rem; }
        .logo-area h1 { font-size: 1.5rem; font-weight: 700; color: var(--text); letter-spacing: -0.025em; }
        .logo-area p { font-size: 0.875rem; color: var(--text-secondary); margin-top: 0.375rem; line-height: 1.5; }
        .logo-area strong { color: var(--text); font-weight: 600; }
        .error-box {
            background: var(--error-bg);
            color: var(--error-text);
            border: 1px solid var(--error-border);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            margin-bottom: 1.25rem;
            line-height: 1.4;
        }
        .field { margin-bottom: 1.125rem; }
        label { display: block; font-size: 0.8125rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 0.375rem; }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 0.625rem 0.875rem;
            border: 1px solid var(--input-border);
            border-radius: 10px;
            font-size: 0.9375rem;
            color: var(--text);
            background: var(--input-bg);
            transition: border-color 0.15s, box-shadow 0.15s;
            outline: none;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: var(--input-focus);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }
        .btn {
            display: block;
            width: 100%;
            padding: 0.6875rem;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
            margin-top: 0.25rem;
        }
        .btn:hover {
            background: var(--primary-hover);
            box-shadow: 0 0 20px var(--primary-glow);
        }
        .btn:active { transform: scale(0.99); }
        .footer { text-align: center; margin-top: 1.75rem; font-size: 0.75rem; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-area">
            {{if .LogoURL}}<img src="{{.LogoURL}}" alt="Logo">{{end}}
            <h1>{{if .LoginPageTitle}}{{.LoginPageTitle}}{{else}}Rampart{{end}}</h1>
            <p>{{if .LoginPageMessage}}{{.LoginPageMessage}}{{else}}Sign in to continue to <strong>{{.ClientName}}</strong>{{end}}</p>
        </div>

        {{if .Error}}
        <div class="error-box">{{.Error}}</div>
        {{end}}

        <form method="POST" action="/oauth/authorize">
            <input type="hidden" name="client_id" value="{{.ClientID}}">
            <input type="hidden" name="redirect_uri" value="{{.RedirectURI}}">
            <input type="hidden" name="response_type" value="code">
            <input type="hidden" name="scope" value="{{.Scope}}">
            <input type="hidden" name="state" value="{{.State}}">
            <input type="hidden" name="code_challenge" value="{{.CodeChallenge}}">
            <input type="hidden" name="code_challenge_method" value="S256">

            <div class="field">
                <label for="identifier">Username or Email</label>
                <input type="text" id="identifier" name="identifier" required autocomplete="username" autofocus>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn">Sign In</button>
        </form>

        <p class="footer">Powered by Rampart</p>
    </div>
</body>
</html>
