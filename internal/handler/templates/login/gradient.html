<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{if .LoginPageTitle}}{{.LoginPageTitle}}{{else}}Sign In — Rampart{{end}}</title>
    <style>
        :root {
            --primary: {{if .PrimaryColor}}{{.PrimaryColor}}{{else}}#7c3aed{{end}};
            --primary-hover: {{if .PrimaryColor}}{{.PrimaryColor}}dd{{else}}#6d28d9{{end}};
            --bg-start: {{if .BackgroundColor}}{{.BackgroundColor}}{{else}}#4f46e5{{end}};
            --bg-end: #7c3aed;
            --card-bg: rgba(255,255,255,0.95);
            --text: #1e293b;
            --text-secondary: #64748b;
            --text-muted: rgba(255,255,255,0.6);
            --border: rgba(0,0,0,0.06);
            --input-bg: #ffffff;
            --input-border: #d1d5db;
            --input-focus: var(--primary);
            --error-bg: #fef2f2;
            --error-text: #dc2626;
            --error-border: #fecaca;
            --shadow: 0 8px 40px rgba(0,0,0,0.15);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 50%, #a855f7 100%);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            right: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
            border-radius: 50%;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            left: -15%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            border-radius: 50%;
        }
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            margin: 1rem;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .logo-area { text-align: center; margin-bottom: 1.75rem; }
        .logo-area img { max-height: 48px; margin-bottom: 0.75rem; }
        .logo-area h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.025em;
        }
        .logo-area p { font-size: 0.875rem; color: var(--text-secondary); margin-top: 0.375rem; line-height: 1.5; }
        .logo-area strong { color: var(--text); font-weight: 600; }
        .error-box {
            background: var(--error-bg);
            color: var(--error-text);
            border: 1px solid var(--error-border);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            margin-bottom: 1.25rem;
            line-height: 1.4;
        }
        .field { margin-bottom: 1.125rem; }
        label { display: block; font-size: 0.8125rem; font-weight: 500; color: var(--text); margin-bottom: 0.375rem; }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 0.625rem 0.875rem;
            border: 1px solid var(--input-border);
            border-radius: 10px;
            font-size: 0.9375rem;
            color: var(--text);
            background: var(--input-bg);
            transition: border-color 0.15s, box-shadow 0.15s;
            outline: none;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: var(--input-focus);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 15%, transparent);
        }
        .btn {
            display: block;
            width: 100%;
            padding: 0.6875rem;
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
            margin-top: 0.25rem;
        }
        .btn:hover {
            opacity: 0.92;
            box-shadow: 0 4px 16px color-mix(in srgb, var(--primary) 30%, transparent);
        }
        .btn:active { transform: scale(0.99); }
        .footer { text-align: center; margin-top: 1.75rem; font-size: 0.75rem; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-area">
            {{if .LogoURL}}<img src="{{.LogoURL}}" alt="Logo">{{end}}
            <h1>{{if .LoginPageTitle}}{{.LoginPageTitle}}{{else}}Rampart{{end}}</h1>
            <p>{{if .LoginPageMessage}}{{.LoginPageMessage}}{{else}}Sign in to continue to <strong>{{.ClientName}}</strong>{{end}}</p>
        </div>

        {{if .Error}}
        <div class="error-box">{{.Error}}</div>
        {{end}}

        <form method="POST" action="/oauth/authorize">
            <input type="hidden" name="client_id" value="{{.ClientID}}">
            <input type="hidden" name="redirect_uri" value="{{.RedirectURI}}">
            <input type="hidden" name="response_type" value="code">
            <input type="hidden" name="scope" value="{{.Scope}}">
            <input type="hidden" name="state" value="{{.State}}">
            <input type="hidden" name="code_challenge" value="{{.CodeChallenge}}">
            <input type="hidden" name="code_challenge_method" value="S256">

            <div class="field">
                <label for="identifier">Username or Email</label>
                <input type="text" id="identifier" name="identifier" required autocomplete="username" autofocus>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn">Sign In</button>
        </form>

        <p class="footer">Powered by Rampart</p>
    </div>
</body>
</html>
