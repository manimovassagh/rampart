<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{if .LoginPageTitle}}{{.LoginPageTitle}}{{else}}Sign In — Rampart{{end}}</title>
    <style>
        :root {
            --primary: {{if .PrimaryColor}}{{.PrimaryColor}}{{else}}#1e40af{{end}};
            --primary-hover: {{if .PrimaryColor}}{{.PrimaryColor}}dd{{else}}#1e3a8a{{end}};
            --bg: {{if .BackgroundColor}}{{.BackgroundColor}}{{else}}#f1f5f9{{end}};
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --input-bg: #f8fafc;
            --input-border: #cbd5e1;
            --input-focus: var(--primary);
            --error-bg: #fef2f2;
            --error-text: #b91c1c;
            --error-border: #fecaca;
            --header-bg: var(--primary);
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 8px 32px rgba(0,0,0,0.06);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
            width: 100%;
            max-width: 420px;
            margin: 1rem;
        }
        .card-header {
            background: var(--header-bg);
            padding: 1.75rem 2rem;
            text-align: center;
        }
        .card-header img { max-height: 44px; margin-bottom: 0.75rem; }
        .card-header h1 { font-size: 1.25rem; font-weight: 600; color: #ffffff; letter-spacing: -0.01em; }
        .card-header p { font-size: 0.8125rem; color: rgba(255,255,255,0.8); margin-top: 0.25rem; }
        .card-body { padding: 2rem; }
        .error-box {
            background: var(--error-bg);
            color: var(--error-text);
            border: 1px solid var(--error-border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.8125rem;
            margin-bottom: 1.25rem;
            line-height: 1.4;
        }
        .field { margin-bottom: 1rem; }
        label { display: block; font-size: 0.8125rem; font-weight: 500; color: var(--text); margin-bottom: 0.375rem; }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 0.625rem 0.75rem;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            font-size: 0.875rem;
            color: var(--text);
            background: var(--input-bg);
            transition: border-color 0.15s, box-shadow 0.15s;
            outline: none;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: var(--input-focus);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 12%, transparent);
            background: #ffffff;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 0.6875rem;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            margin-top: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .btn:hover { background: var(--primary-hover); }
        .btn:active { transform: scale(0.99); }
        .card-footer {
            border-top: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-footer a, .card-footer span {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-decoration: none;
        }
        .card-footer a:hover { color: var(--primary); }
        .powered { text-align: center; margin-top: 1.25rem; font-size: 0.6875rem; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            {{if .LogoURL}}<img src="{{.LogoURL}}" alt="Logo">{{else}}<h1>{{if .LoginPageTitle}}{{.LoginPageTitle}}{{else}}Rampart{{end}}</h1>{{end}}
            <p>{{if .LoginPageMessage}}{{.LoginPageMessage}}{{else}}Sign in to {{.ClientName}}{{end}}</p>
        </div>

        <div class="card-body">
            {{if .Error}}
            <div class="error-box">{{.Error}}</div>
            {{end}}

            <form method="POST" action="/oauth/authorize">
                <input type="hidden" name="client_id" value="{{.ClientID}}">
                <input type="hidden" name="redirect_uri" value="{{.RedirectURI}}">
                <input type="hidden" name="response_type" value="code">
                <input type="hidden" name="scope" value="{{.Scope}}">
                <input type="hidden" name="state" value="{{.State}}">
                <input type="hidden" name="code_challenge" value="{{.CodeChallenge}}">
                <input type="hidden" name="code_challenge_method" value="S256">

                <div class="field">
                    <label for="identifier">Username or Email</label>
                    <input type="text" id="identifier" name="identifier" required autocomplete="username" autofocus>
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn">Sign In</button>
            </form>
        </div>

        <div class="card-footer">
            <span>Secure authentication</span>
            <span>Powered by Rampart</span>
        </div>
    </div>
</body>
</html>
