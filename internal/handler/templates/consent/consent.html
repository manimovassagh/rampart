<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorize — Rampart</title>
    <link rel="stylesheet" href="/static/consent.css">
</head>
<body>
    <div class="consent-card">
        <div class="app-info">
            <div class="app-name">{{.ClientName}}</div>
            {{if .ClientDescription}}<div class="app-desc">{{.ClientDescription}}</div>{{end}}
        </div>

        <p class="consent-prompt">
            <strong>{{.ClientName}}</strong> is requesting access to your account. This will allow it to:
        </p>

        <ul class="scopes-list">
            {{range .ScopeDetails}}
            <li>
                <span class="scope-icon">✓</span>
                <div>
                    {{.Label}}
                    {{if .Description}}<span class="scope-desc">{{.Description}}</span>{{end}}
                </div>
            </li>
            {{end}}
        </ul>

        <div class="actions">
            <form method="POST" action="/oauth/consent" class="consent-form-wrapper">
                <input type="hidden" name="client_id" value="{{.ClientID}}">
                <input type="hidden" name="redirect_uri" value="{{.RedirectURI}}">
                <input type="hidden" name="scope" value="{{.Scope}}">
                <input type="hidden" name="state" value="{{.State}}">
                <input type="hidden" name="code_challenge" value="{{.CodeChallenge}}">
                <input type="hidden" name="nonce" value="{{.Nonce}}">

                <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
                <input type="hidden" name="consent" value="deny">
                <button type="submit" class="btn btn-deny">Deny</button>
            </form>
            <form method="POST" action="/oauth/consent" class="consent-form-wrapper">
                <input type="hidden" name="client_id" value="{{.ClientID}}">
                <input type="hidden" name="redirect_uri" value="{{.RedirectURI}}">
                <input type="hidden" name="scope" value="{{.Scope}}">
                <input type="hidden" name="state" value="{{.State}}">
                <input type="hidden" name="code_challenge" value="{{.CodeChallenge}}">
                <input type="hidden" name="nonce" value="{{.Nonce}}">

                <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
                <input type="hidden" name="consent" value="allow">
                <button type="submit" class="btn btn-allow">Allow</button>
            </form>
        </div>

        <div class="footer">Powered by Rampart IAM</div>
    </div>
</body>
</html>
