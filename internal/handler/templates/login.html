<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Rampart</title>
    <link rel="stylesheet" href="/static/admin.css">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8 w-full max-w-sm">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-gray-900">Rampart</h1>
            <p class="text-sm text-gray-500 mt-1">Sign in to continue to <strong>{{.ClientName}}</strong></p>
        </div>

        {{if .Error}}
        <div class="bg-red-50 text-red-600 border border-red-200 rounded-lg px-4 py-3 text-sm mb-4">{{.Error}}</div>
        {{end}}

        <form method="POST" action="/oauth/authorize">
            <input type="hidden" name="client_id" value="{{.ClientID}}">
            <input type="hidden" name="redirect_uri" value="{{.RedirectURI}}">
            <input type="hidden" name="response_type" value="code">
            <input type="hidden" name="scope" value="{{.Scope}}">
            <input type="hidden" name="state" value="{{.State}}">
            <input type="hidden" name="code_challenge" value="{{.CodeChallenge}}">
            <input type="hidden" name="code_challenge_method" value="S256">

            <div class="mb-4">
                <label for="identifier" class="block text-sm font-medium text-gray-700 mb-1">Username or Email</label>
                <input type="text" id="identifier" name="identifier" required autocomplete="username" autofocus
                       class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div class="mb-4">
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password"
                       class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>

            <button type="submit"
                    class="w-full py-2.5 bg-blue-600 text-white rounded-lg text-sm font-semibold hover:bg-blue-700 transition-colors">
                Sign In
            </button>
        </form>

        <p class="text-center mt-6 text-xs text-gray-400">Powered by Rampart</p>
    </div>
</body>
</html>
