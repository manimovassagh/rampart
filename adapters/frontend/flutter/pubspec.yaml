name: rampart_flutter
description: Flutter authentication SDK for Rampart IAM. Implements OAuth 2.0 Authorization Code with PKCE for mobile (iOS/Android) and web platforms.
version: 0.1.0
homepage: https://github.com/manimovassagh/rampart
repository: https://github.com/manimovassagh/rampart/tree/main/adapters/frontend/flutter

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  flutter_secure_storage: ^9.2.0
  url_launcher: ^6.2.0
  crypto: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
