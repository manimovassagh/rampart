openapi: 3.0.3
info:
  title: Rampart API
  description: |
    Rampart is a lightweight, modern identity and access management server.

    ## API Domains

    - **OAuth 2.0 / OIDC** — Standard protocol endpoints following RFCs
    - **Admin API** — Full resource management (requires admin scope)
    - **Account API** — Self-service for authenticated users
    - **System** — Health and readiness checks

    ## Authentication

    - Admin API: Bearer token with `rampart:admin` scope
    - Account API: Bearer token with valid user session
    - OAuth/OIDC: Per-spec client authentication
  version: 1.0.0
  contact:
    name: Rampart
    url: https://github.com/manimovassagh/rampart
  license:
    name: AGPL-3.0
    url: https://www.gnu.org/licenses/agpl-3.0.html

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://auth.example.com
    description: Production (example)

tags:
  - name: OAuth
    description: OAuth 2.0 protocol endpoints (RFC 6749)
  - name: OIDC
    description: OpenID Connect endpoints
  - name: Discovery
    description: Well-known discovery endpoints
  - name: Admin - Organizations
    description: Organization (tenant) management
  - name: Admin - Users
    description: User management
  - name: Admin - Clients
    description: OAuth client management
  - name: Admin - Roles
    description: Role and permission management
  - name: Admin - Groups
    description: Group management
  - name: Admin - Identity Providers
    description: External identity provider management
  - name: Admin - Sessions
    description: Session management
  - name: Admin - Events
    description: Audit log
  - name: Account
    description: Self-service account management
  - name: System
    description: Health and readiness

paths:
  # ─── OAuth 2.0 Endpoints ───────────────────────────────────────────

  /oauth/authorize:
    get:
      tags: [OAuth]
      summary: Authorization endpoint
      description: |
        Initiates an OAuth 2.0 authorization flow. Redirects the user to the
        login page if not already authenticated. Supports Authorization Code
        flow with PKCE (RFC 7636).
      operationId: authorize
      parameters:
        - name: response_type
          in: query
          required: true
          schema:
            type: string
            enum: [code]
        - name: client_id
          in: query
          required: true
          schema:
            type: string
        - name: redirect_uri
          in: query
          required: true
          schema:
            type: string
            format: uri
        - name: scope
          in: query
          required: true
          schema:
            type: string
          description: Space-delimited scopes. Include "openid" for OIDC.
        - name: state
          in: query
          schema:
            type: string
          description: CSRF protection value
        - name: code_challenge
          in: query
          schema:
            type: string
          description: PKCE code challenge (required for public clients)
        - name: code_challenge_method
          in: query
          schema:
            type: string
            enum: [S256]
        - name: nonce
          in: query
          schema:
            type: string
          description: Binds ID token to session (recommended for OIDC)
        - name: prompt
          in: query
          schema:
            type: string
            enum: [none, login, consent, select_account]
        - name: login_hint
          in: query
          schema:
            type: string
      responses:
        "302":
          description: Redirect to login or back to client with authorization code
        "400":
          description: Invalid request (missing or invalid parameters)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"

  /oauth/token:
    post:
      tags: [OAuth]
      summary: Token endpoint
      description: |
        Exchanges an authorization code, refresh token, client credentials,
        or device code for access and refresh tokens.
      operationId: token
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [grant_type]
              properties:
                grant_type:
                  type: string
                  enum:
                    - authorization_code
                    - refresh_token
                    - client_credentials
                    - "urn:ietf:params:oauth:grant-type:device_code"
                code:
                  type: string
                  description: Authorization code (for authorization_code grant)
                redirect_uri:
                  type: string
                  format: uri
                code_verifier:
                  type: string
                  description: PKCE code verifier
                refresh_token:
                  type: string
                  description: Refresh token (for refresh_token grant)
                client_id:
                  type: string
                client_secret:
                  type: string
                scope:
                  type: string
                device_code:
                  type: string
                  description: Device code (for device_code grant)
      responses:
        "200":
          description: Token response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
        "401":
          description: Invalid client authentication
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"

  /oauth/revoke:
    post:
      tags: [OAuth]
      summary: Revoke token
      description: Revokes an access or refresh token (RFC 7009). Always returns 200.
      operationId: revokeToken
      security:
        - clientBasic: []
        - clientPost: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                token_type_hint:
                  type: string
                  enum: [access_token, refresh_token]
      responses:
        "200":
          description: Token revoked (or was already invalid)

  /oauth/introspect:
    post:
      tags: [OAuth]
      summary: Introspect token
      description: Returns metadata about a token (RFC 7662). Requires client authentication.
      operationId: introspectToken
      security:
        - clientBasic: []
        - clientPost: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Token introspection response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntrospectionResponse"

  /oauth/device:
    post:
      tags: [OAuth]
      summary: Device authorization
      description: Initiates device authorization flow (RFC 8628) for CLIs and smart TVs.
      operationId: deviceAuthorization
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [client_id]
              properties:
                client_id:
                  type: string
                scope:
                  type: string
      responses:
        "200":
          description: Device authorization response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceAuthorizationResponse"

  # ─── OIDC Endpoints ────────────────────────────────────────────────

  /oidc/userinfo:
    get:
      tags: [OIDC]
      summary: UserInfo endpoint
      description: Returns claims about the authenticated user based on token scopes.
      operationId: getUserInfo
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User claims
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfo"
        "401":
          description: Invalid or expired token

  /oidc/logout:
    get:
      tags: [OIDC]
      summary: End session
      description: Ends the user's session and optionally redirects to the client.
      operationId: logout
      parameters:
        - name: id_token_hint
          in: query
          schema:
            type: string
        - name: post_logout_redirect_uri
          in: query
          schema:
            type: string
            format: uri
        - name: state
          in: query
          schema:
            type: string
      responses:
        "302":
          description: Redirect to post-logout URI or default page

  # ─── Discovery ─────────────────────────────────────────────────────

  /.well-known/openid-configuration:
    get:
      tags: [Discovery]
      summary: OIDC Discovery document
      description: Returns OpenID Connect Provider metadata.
      operationId: getDiscovery
      responses:
        "200":
          description: OIDC Discovery metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveryDocument"

  /.well-known/jwks.json:
    get:
      tags: [Discovery]
      summary: JSON Web Key Set
      description: Returns the public keys used to verify token signatures.
      operationId: getJWKS
      responses:
        "200":
          description: JWKS
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JWKS"

  # ─── Admin API: Organizations ──────────────────────────────────────

  /api/v1/admin/organizations:
    get:
      tags: [Admin - Organizations]
      summary: List organizations
      operationId: listOrganizations
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Paginated list of organizations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationList"
    post:
      tags: [Admin - Organizations]
      summary: Create organization
      operationId: createOrganization
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganization"
      responses:
        "201":
          description: Organization created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"

  /api/v1/admin/organizations/{org_id}:
    get:
      tags: [Admin - Organizations]
      summary: Get organization
      operationId: getOrganization
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgId"
      responses:
        "200":
          description: Organization details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Admin - Organizations]
      summary: Update organization
      operationId: updateOrganization
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrganization"
      responses:
        "200":
          description: Organization updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
    delete:
      tags: [Admin - Organizations]
      summary: Delete organization
      operationId: deleteOrganization
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgId"
      responses:
        "204":
          description: Organization deleted

  /api/v1/admin/organizations/{org_id}/settings:
    put:
      tags: [Admin - Organizations]
      summary: Update organization settings
      operationId: updateOrganizationSettings
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrganizationSettings"
      responses:
        "200":
          description: Settings updated

  /api/v1/admin/organizations/{org_id}/branding:
    put:
      tags: [Admin - Organizations]
      summary: Update organization branding
      operationId: updateOrganizationBranding
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrganizationBranding"
      responses:
        "200":
          description: Branding updated

  # ─── Admin API: Users ──────────────────────────────────────────────

  /api/v1/admin/users:
    get:
      tags: [Admin - Users]
      summary: List users
      operationId: listUsers
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - name: search
          in: query
          schema:
            type: string
          description: Search by name, email, or username
        - name: enabled
          in: query
          schema:
            type: boolean
        - name: org_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserList"
    post:
      tags: [Admin - Users]
      summary: Create user
      operationId: createUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUser"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /api/v1/admin/users/{user_id}:
    get:
      tags: [Admin - Users]
      summary: Get user
      operationId: getUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Admin - Users]
      summary: Update user
      operationId: updateUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUser"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      tags: [Admin - Users]
      summary: Delete user
      operationId: deleteUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "204":
          description: User deleted

  /api/v1/admin/users/{user_id}/reset-password:
    post:
      tags: [Admin - Users]
      summary: Reset user password
      operationId: resetUserPassword
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
                  format: password
                temporary:
                  type: boolean
                  default: false
                  description: User must change password on next login
      responses:
        "204":
          description: Password reset

  /api/v1/admin/users/{user_id}/disable:
    post:
      tags: [Admin - Users]
      summary: Disable user
      operationId: disableUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "204":
          description: User disabled

  /api/v1/admin/users/{user_id}/enable:
    post:
      tags: [Admin - Users]
      summary: Enable user
      operationId: enableUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "204":
          description: User enabled

  /api/v1/admin/users/{user_id}/sessions:
    get:
      tags: [Admin - Users]
      summary: List user sessions
      operationId: listUserSessions
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: User sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionList"
    delete:
      tags: [Admin - Users]
      summary: Revoke all user sessions
      operationId: revokeUserSessions
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "204":
          description: All sessions revoked

  /api/v1/admin/users/{user_id}/roles:
    get:
      tags: [Admin - Users]
      summary: List user role assignments
      operationId: listUserRoles
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: User roles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleList"
    post:
      tags: [Admin - Users]
      summary: Assign roles to user
      operationId: assignUserRoles
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role_ids]
              properties:
                role_ids:
                  type: array
                  items:
                    type: string
      responses:
        "204":
          description: Roles assigned
    delete:
      tags: [Admin - Users]
      summary: Remove roles from user
      operationId: removeUserRoles
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role_ids]
              properties:
                role_ids:
                  type: array
                  items:
                    type: string
      responses:
        "204":
          description: Roles removed

  # ─── Admin API: Clients ────────────────────────────────────────────

  /api/v1/admin/clients:
    get:
      tags: [Admin - Clients]
      summary: List clients
      operationId: listClients
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Paginated list of clients
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientList"
    post:
      tags: [Admin - Clients]
      summary: Create client
      operationId: createClient
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClient"
      responses:
        "201":
          description: Client created (includes secret for confidential clients)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientWithSecret"

  /api/v1/admin/clients/{client_id}:
    get:
      tags: [Admin - Clients]
      summary: Get client
      operationId: getClient
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ClientId"
      responses:
        "200":
          description: Client details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Admin - Clients]
      summary: Update client
      operationId: updateClient
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ClientId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClient"
      responses:
        "200":
          description: Client updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
    delete:
      tags: [Admin - Clients]
      summary: Delete client
      operationId: deleteClient
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ClientId"
      responses:
        "204":
          description: Client deleted

  /api/v1/admin/clients/{client_id}/rotate-secret:
    post:
      tags: [Admin - Clients]
      summary: Rotate client secret
      operationId: rotateClientSecret
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ClientId"
      responses:
        "200":
          description: New secret (old secret valid for grace period)
          content:
            application/json:
              schema:
                type: object
                properties:
                  client_secret:
                    type: string
                  previous_secret_expires_at:
                    type: string
                    format: date-time

  # ─── Admin API: Roles ──────────────────────────────────────────────

  /api/v1/admin/roles:
    get:
      tags: [Admin - Roles]
      summary: List roles
      operationId: listRoles
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Paginated list of roles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleList"
    post:
      tags: [Admin - Roles]
      summary: Create role
      operationId: createRole
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRole"
      responses:
        "201":
          description: Role created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"

  /api/v1/admin/roles/{role_id}:
    get:
      tags: [Admin - Roles]
      summary: Get role
      operationId: getRole
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RoleId"
      responses:
        "200":
          description: Role details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
    put:
      tags: [Admin - Roles]
      summary: Update role
      operationId: updateRole
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RoleId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRole"
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
    delete:
      tags: [Admin - Roles]
      summary: Delete role
      operationId: deleteRole
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RoleId"
      responses:
        "204":
          description: Role deleted

  /api/v1/admin/roles/{role_id}/permissions:
    get:
      tags: [Admin - Roles]
      summary: List role permissions
      operationId: listRolePermissions
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RoleId"
      responses:
        "200":
          description: Role permissions
    post:
      tags: [Admin - Roles]
      summary: Assign permissions to role
      operationId: assignRolePermissions
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RoleId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [permission_ids]
              properties:
                permission_ids:
                  type: array
                  items:
                    type: string
      responses:
        "204":
          description: Permissions assigned
    delete:
      tags: [Admin - Roles]
      summary: Remove permissions from role
      operationId: removeRolePermissions
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RoleId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [permission_ids]
              properties:
                permission_ids:
                  type: array
                  items:
                    type: string
      responses:
        "204":
          description: Permissions removed

  /api/v1/admin/roles/{role_id}/users:
    get:
      tags: [Admin - Roles]
      summary: List users with role
      operationId: listRoleUsers
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RoleId"
      responses:
        "200":
          description: Users with this role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserList"

  # ─── Admin API: Groups ─────────────────────────────────────────────

  /api/v1/admin/groups:
    get:
      tags: [Admin - Groups]
      summary: List groups
      operationId: listGroups
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Paginated list of groups
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupList"
    post:
      tags: [Admin - Groups]
      summary: Create group
      operationId: createGroup
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroup"
      responses:
        "201":
          description: Group created
