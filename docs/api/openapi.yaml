  # ─── System ────────────────────────────────────────────────────────

  /healthz:
    get:
      tags: [System]
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /readyz:
    get:
      tags: [System]
      summary: Readiness check
      description: Returns 200 when the server is ready to accept traffic (DB and cache connected).
      operationId: readinessCheck
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ready
                  checks:
                    type: object
                    properties:
                      database:
                        type: string
                        example: ok
                      cache:
                        type: string
                        example: ok
        "503":
          description: Not ready

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    clientBasic:
      type: http
      scheme: basic
      description: Client ID and secret via HTTP Basic
    clientPost:
      type: apiKey
      in: query
      name: client_secret
      description: Client secret as form parameter

  parameters:
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
    OrgId:
      name: org_id
      in: path
      required: true
      schema:
        type: string
    UserId:
      name: user_id
      in: path
      required: true
      schema:
        type: string
    ClientId:
      name: client_id
      in: path
      required: true
      schema:
        type: string
    RoleId:
      name: role_id
      in: path
      required: true
      schema:
        type: string
    GroupId:
      name: group_id
      in: path
      required: true
      schema:
        type: string
    IdpId:
      name: idp_id
      in: path
      required: true
      schema:
        type: string

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"

  schemas:
    # ─── Common ────────────────────────────────────────────────────

    ApiError:
      type: object
      required: [error, error_description, status]
      properties:
        error:
          type: string
        error_description:
          type: string
        status:
          type: integer
        request_id:
          type: string

    OAuthError:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: "RFC 6749 error code"
        error_description:
          type: string

    Pagination:
      type: object
      properties:
        total:
          type: integer
        limit:
          type: integer
        has_more:
          type: boolean
        next_cursor:
          type: string
          nullable: true

    # ─── OAuth/OIDC ────────────────────────────────────────────────

    TokenResponse:
      type: object
      required: [access_token, token_type]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
        refresh_token:
          type: string
        id_token:
          type: string
        scope:
          type: string

    IntrospectionResponse:
      type: object
      required: [active]
      properties:
        active:
          type: boolean
        scope:
          type: string
        client_id:
          type: string
        username:
          type: string
        token_type:
          type: string
        exp:
          type: integer
        iat:
          type: integer
        sub:
          type: string
        iss:
          type: string
        aud:
          type: string

    DeviceAuthorizationResponse:
      type: object
      required: [device_code, user_code, verification_uri, expires_in, interval]
      properties:
        device_code:
          type: string
        user_code:
          type: string
        verification_uri:
          type: string
          format: uri
        verification_uri_complete:
          type: string
          format: uri
        expires_in:
          type: integer
        interval:
          type: integer

    UserInfo:
      type: object
      required: [sub]
      properties:
        sub:
          type: string
        name:
          type: string
        given_name:
          type: string
        family_name:
          type: string
        email:
          type: string
          format: email
        email_verified:
          type: boolean
        phone_number:
          type: string
        phone_number_verified:
          type: boolean
        picture:
          type: string
          format: uri
        updated_at:
          type: integer

    DiscoveryDocument:
      type: object
      properties:
        issuer:
          type: string
        authorization_endpoint:
          type: string
        token_endpoint:
          type: string
        userinfo_endpoint:
          type: string
        jwks_uri:
          type: string
        scopes_supported:
          type: array
          items:
            type: string
        response_types_supported:
          type: array
          items:
            type: string
        grant_types_supported:
          type: array
          items:
            type: string
        subject_types_supported:
          type: array
          items:
            type: string
        id_token_signing_alg_values_supported:
          type: array
          items:
            type: string
        token_endpoint_auth_methods_supported:
          type: array
          items:
            type: string
        code_challenge_methods_supported:
          type: array
          items:
            type: string
        claims_supported:
          type: array
          items:
            type: string

    JWKS:
      type: object
      properties:
        keys:
          type: array
          items:
            type: object
            properties:
              kty:
                type: string
              use:
                type: string
              alg:
                type: string
              kid:
                type: string
              n:
                type: string
              e:
                type: string
              crv:
                type: string
              x:
                type: string
              "y":
                type: string

    # ─── Organizations ─────────────────────────────────────────────

    Organization:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        display_name:
          type: string
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateOrganization:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
        slug:
          type: string
        display_name:
          type: string

    UpdateOrganization:
      type: object
      properties:
        display_name:
          type: string
        enabled:
          type: boolean

    OrganizationList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Organization"
        pagination:
          $ref: "#/components/schemas/Pagination"

    OrganizationSettings:
      type: object
      properties:
        session_lifetime:
          type: integer
        mfa_policy:
          type: string
          enum: [disabled, optional, required]
        password_policy:
          type: object
          properties:
            min_length:
              type: integer
            require_uppercase:
              type: boolean
            require_number:
              type: boolean
            require_special:
              type: boolean
        allowed_redirect_domains:
          type: array
          items:
            type: string

    OrganizationBranding:
      type: object
      properties:
        logo_url:
          type: string
          format: uri
        primary_color:
          type: string
        background_color:
          type: string
        custom_css:
          type: string

    # ─── Users ─────────────────────────────────────────────────────

    User:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
          format: email
        email_verified:
          type: boolean
        given_name:
          type: string
        family_name:
          type: string
        enabled:
          type: boolean
        mfa_enabled:
          type: boolean
        org_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_login_at:
          type: string
          format: date-time
          nullable: true

    CreateUser:
      type: object
      required: [username, email, password, org_id]
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        given_name:
          type: string
        family_name:
          type: string
        password:
          type: string
          format: password
        email_verified:
          type: boolean
          default: false
        enabled:
          type: boolean
          default: true
        org_id:
          type: string

    UpdateUser:
      type: object
      properties:
        given_name:
          type: string
        family_name:
          type: string
        enabled:
          type: boolean

    UserList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        pagination:
          $ref: "#/components/schemas/Pagination"

    UserProfile:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
          format: email
        email_verified:
          type: boolean
        given_name:
          type: string
        family_name:
          type: string
        picture:
          type: string
          format: uri
        phone_number:
          type: string
        phone_number_verified:
          type: boolean
        mfa_enabled:
          type: boolean
        org_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UpdateProfile:
      type: object
      properties:
        given_name:
          type: string
        family_name:
          type: string
        picture:
          type: string
          format: uri
        phone_number:
          type: string

    # ─── Clients ───────────────────────────────────────────────────

    Client:
      type: object
      properties:
        id:
          type: string
        client_id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [public, confidential]
        grant_types:
          type: array
          items:
            type: string
        redirect_uris:
          type: array
          items:
            type: string
            format: uri
        post_logout_redirect_uris:
          type: array
          items:
            type: string
            format: uri
        allowed_scopes:
          type: array
          items:
            type: string
        token_endpoint_auth_method:
          type: string
          enum: [none, client_secret_basic, client_secret_post, private_key_jwt]
        enabled:
          type: boolean
        org_id:
          type: string
        created_at:
          type: string
          format: date-time

    ClientWithSecret:
      allOf:
        - $ref: "#/components/schemas/Client"
        - type: object
          properties:
            client_secret:
              type: string
              description: Only returned on creation

    CreateClient:
      type: object
      required: [client_id, name, type, grant_types, org_id]
      properties:
        client_id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [public, confidential]
        grant_types:
          type: array
          items:
            type: string
        redirect_uris:
          type: array
          items:
            type: string
            format: uri
        post_logout_redirect_uris:
          type: array
          items:
            type: string
            format: uri
        allowed_scopes:
          type: array
          items:
            type: string
        token_endpoint_auth_method:
          type: string
          enum: [none, client_secret_basic, client_secret_post, private_key_jwt]
          default: client_secret_basic
        org_id:
          type: string

    UpdateClient:
      type: object
      properties:
        name:
          type: string
        redirect_uris:
          type: array
          items:
            type: string
            format: uri
        post_logout_redirect_uris:
          type: array
          items:
            type: string
            format: uri
        allowed_scopes:
          type: array
          items:
            type: string
        enabled:
          type: boolean

    ClientList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Client"
        pagination:
          $ref: "#/components/schemas/Pagination"

    # ─── Roles ─────────────────────────────────────────────────────

    Role:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        display_name:
          type: string
        description:
          type: string
        org_id:
          type: string
